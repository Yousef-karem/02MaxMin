name: TestNexus Incremental

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.java"
      - "pom.xml"
      - "build.gradle"
      - "build.gradle.kts"
  pull_request:
    paths:
      - "**/*.java"
      - "pom.xml"
      - "build.gradle"
      - "build.gradle.kts"

jobs:
  testnexus-incremental:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout TestNexus tool
        uses: actions/checkout@v4
        with:
          repository: Yousef-karem/Unit-test-demo
          path: testnexus-tool

      - name: Restore demo_out cache
        uses: actions/cache@v4
        with:
          path: demo_out
          key: testnexus-${{ github.repository }}-${{ github.ref_name }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            testnexus-${{ github.repository }}-${{ github.ref_name }}-
            testnexus-${{ github.repository }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testnexus-tool/requirements.txt

      - name: Run TestNexus incremental pipeline
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          python testnexus-tool/scripts/testnexus_ci.py \
            --repo . \
            --tool-script testnexus-tool/llm_coverage_demo.py \
            --output-dir demo_out \
            --mode method \
            --max-targets 10 \
            --skip-if-no-java-changes \
            --docker-maven

      - name: Upload demo_out artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testnexus-demo-out
          path: demo_out/**
